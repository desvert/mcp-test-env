%YAML 1.1
---
# Suricata configuration for the network forensics lab environment.
# HOME_NET covers only the lab bridge subnet; everything else is EXTERNAL_NET.

vars:
  address-groups:
    HOME_NET: "[172.30.0.0/24]"
    EXTERNAL_NET: "!$HOME_NET"
    HTTP_SERVERS: "$HOME_NET"
    SMTP_SERVERS: "$HOME_NET"
    SQL_SERVERS: "$HOME_NET"
    DNS_SERVERS: "$HOME_NET"
    TELNET_SERVERS: "$HOME_NET"
    AIM_SERVERS: "$EXTERNAL_NET"
    DC_SERVERS: "$HOME_NET"
    MODBUS_CLIENT: "$HOME_NET"
    MODBUS_SERVER: "$HOME_NET"
    ENIP_CLIENT: "$HOME_NET"
    ENIP_SERVER: "$HOME_NET"

  port-groups:
    HTTP_PORTS: "80,8180"
    SHELLCODE_PORTS: "!80"
    ORACLE_PORTS: 1521
    SSH_PORTS: 22
    DNP3_PORTS: 20000
    MODBUS_PORTS: 502
    FILE_DATA_PORTS: "[$HTTP_PORTS,110,143]"
    FTP_PORTS: 21

# ── Logging ───────────────────────────────────────────────────────────────────

default-log-dir: /var/log/suricata/

stats:
  enabled: yes
  interval: 8

outputs:
  # One line per alert — easy to grep
  - fast:
      enabled: yes
      filename: fast.log
      append: yes

  # Rich JSON event stream — use this with mcp__netparse__suricata_alerts
  - eve-log:
      enabled: yes
      filetype: regular
      filename: eve.json
      community-id: true          # Correlate with Zeek conn.log uid
      types:
        - alert:
            payload: yes
            payload-buffer-size: 4kb
            payload-printable: yes
            packet: yes
            metadata: yes
            http-body: yes
            http-body-printable: yes
            tagged-packets: yes
        - anomaly:
            enabled: yes
        - http:
            extended: yes
        - dns:
            version: 2
        - tls:
            extended: yes
        - files:
            force-magic: no
        - smtp:
        - ssh
        - ftp
        - rdp
        - flow

  - pcap-log:
      enabled: no         # tcpdump handles PCAP; enable here only if needed
      filename: log.pcap

logging:
  default-log-level: notice
  outputs:
    - console:
        enabled: yes
        type: json
    - file:
        enabled: yes
        level: info
        filename: suricata.log
        type: json
    - syslog:
        enabled: no

# ── Capture ───────────────────────────────────────────────────────────────────
# Interface is passed via `suricata -i lab-br0` on the command line.
# The `default` interface entry below provides AF_PACKET tuning for whatever
# interface is specified at runtime.

af-packet:
  - interface: default
    cluster-id: 99
    cluster-type: cluster_flow
    defrag: yes
    use-mmap: yes
    tpacket-v3: yes
    buffer-size: 65536
    use-emergency-flush: yes

pcap:
  - interface: default

# ── Detection engine ──────────────────────────────────────────────────────────

pcre:
  match-limit: 3500
  match-limit-recursion: 1500

detect:
  profile: medium
  custom-values:
    toclient-groups: 3
    toserver-groups: 25
  sgh-mpm-context: auto
  inspection-recursion-limit: 3000
  prefilter:
    default: mpm

mpm-algo: auto
spm-algo: auto

# ── App-layer protocol detection ──────────────────────────────────────────────

app-layer:
  protocols:
    tls:
      enabled: yes
      detection-ports:
        dp: 443
    http2:
      enabled: yes
    smtp:
      enabled: yes
      mime:
        decode-mime: yes
        decode-base64: yes
        decode-quoted-printable: yes
        extract-urls: yes
      inspected-tracker:
        content-limit: 100755
        content-inspect-min-size: 32768
        content-inspect-window: 4096
    imap:
      enabled: detection-only
    dns:
      tcp:
        enabled: yes
        detection-ports:
          dp: 53
      udp:
        enabled: yes
        detection-ports:
          dp: 53
    http:
      enabled: yes
      libhtp:
        default-config:
          personality: IDS
          request-body-limit: 100kb
          response-body-limit: 100kb
          request-body-minimal-inspect-size: 32kb
          request-body-inspect-window: 4kb
          response-body-minimal-inspect-size: 40kb
          response-body-inspect-window: 16kb
          response-body-decompress-layer-limit: 2
          http-body-inline: auto
          double-decode-path: no
          double-decode-query: no
    ftp:
      enabled: yes
    rdp:
      enabled: yes
    ssh:
      enabled: yes
      hassh: yes      # fingerprint SSH clients/servers
    rfb:
      enabled: yes    # VNC
    modbus:
      enabled: yes
      detection-ports:
        dp: 502
    dnp3:
      enabled: yes
      detection-ports:
        dp: 20000

asn1-max-frames: 256

# ── Flow / stream / memory ────────────────────────────────────────────────────

host-mode: auto

flow:
  memcap: 64mb
  hash-size: 65536
  prealloc: 10000
  emergency-recovery: 30
  prune-flows: 5

flow-timeouts:
  default:
    new: 30
    established: 300
    closed: 0
    bypassed: 100
    emergency-new: 10
    emergency-established: 100
    emergency-closed: 0
    emergency-bypassed: 50
  tcp:
    new: 60
    established: 600
    closed: 60
    bypassed: 100
    emergency-new: 5
    emergency-established: 100
    emergency-closed: 10
    emergency-bypassed: 50
  udp:
    new: 30
    established: 300
    bypassed: 100
    emergency-new: 10
    emergency-established: 100
    emergency-bypassed: 50
  icmp:
    new: 30
    established: 300
    bypassed: 100
    emergency-new: 10
    emergency-established: 100
    emergency-bypassed: 50

stream:
  memcap: 64mb
  checksum-validation: no   # Off — local lab traffic; checksums often wrong
  inline: no
  reassembly:
    memcap: 256mb
    depth: 1mb
    toserver-chunk-size: 2560
    toclient-chunk-size: 2560
    randomize-chunk-size: yes

defrag:
  memcap: 32mb
  hash-size: 65536
  trackers: 65535
  max-frags: 65535
  prealloc: yes
  timeout: 60

host:
  hash-size: 4096
  prealloc: 1000
  memcap: 32mb

decoder:
  teredo:
    enabled: true
  vxlan:
    enabled: true

threading:
  set-cpu-affinity: no
  detect-thread-ratio: 1.0

legacy:
  uricontent: enabled

# ── Rules ─────────────────────────────────────────────────────────────────────
# suricata-update (run at container startup) writes rules to this path.
# If the update fails, start.sh touches the file so Suricata still starts.

rule-files:
  - /var/lib/suricata/rules/suricata.rules

classification-file: /etc/suricata/classification.config
reference-config-file: /etc/suricata/reference.config
