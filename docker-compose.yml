# ── Network ───────────────────────────────────────────────────────────────────
# A named bridge gives us a deterministic interface name (lab-br0) on the host.
# Sensor containers use network_mode: host so they can attach to lab-br0 in
# promiscuous mode and see all traffic between attacker and victim.
networks:
  labnet:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: lab-br0
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24

services:

  # ── Vulnerable target ───────────────────────────────────────────────────────
  victim:
    image: tleemcjr/metasploitable2:latest
    hostname: victim
    networks:
      labnet:
        ipv4_address: 172.30.0.10
    # Metasploitable2 boots a full SysV init system inside the container and
    # needs elevated capabilities to start its services (vsftpd, sshd, apache,
    # postgres, ircd, etc.).
    privileged: true
    tty: true
    restart: "no"

  # ── Automated attacker ──────────────────────────────────────────────────────
  attacker:
    build:
      context: ./attacker
    hostname: attacker
    networks:
      labnet:
        ipv4_address: 172.30.0.20
    volumes:
      - ./output:/output
    # Start after sensors are up so no attack traffic is missed
    depends_on:
      - victim
      - modbus-sim
      - tcpdump
      - suricata
      - zeek
    restart: "no"

  # ── Modbus TCP HVAC simulator ───────────────────────────────────────────────
  # Simulates a Modbus TCP HVAC controller on a static IP.
  # Sensors (tcpdump, Suricata, Zeek) capture its traffic automatically via
  # lab-br0 -- no changes to sensor containers required.
  #
  # Interact from the attacker container:
  #   docker compose exec attacker mbpoll -t 3 -r 1 -c 4 -1 172.30.0.30
  # Or from the host (if you uncomment the ports block below):
  #   mbpoll -t 3 -r 1 -c 4 -1 localhost
  modbus-sim:
    build:
      context: ./modbus-sim
      dockerfile: Dockerfile
    hostname: modbus-sim
    container_name: modbus-sim
    networks:
      labnet:
        ipv4_address: 172.30.0.30
    # ports:
    #   - "5020:5020"     # uncomment + change CMD port for host access without root
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: "no"

  # ── Sensors (host network — monitor lab-br0 in promiscuous mode) ────────────

  tcpdump:
    build:
      context: ./sensor/tcpdump
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./output/pcap:/pcap
    depends_on:
      - victim
    restart: "no"

  suricata:
    image: jasonish/suricata:latest
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./output/suricata:/var/log/suricata
      - ./sensor/suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
      - ./sensor/suricata/start.sh:/start.sh:ro
    entrypoint: ["/bin/bash", "/start.sh"]
    depends_on:
      - victim
    restart: "no"

  zeek:
    image: zeek/zeek:latest
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./output/zeek:/zeek-logs
      - ./sensor/zeek/start.sh:/start.sh:ro
    working_dir: /zeek-logs
    entrypoint: ["/bin/bash", "/start.sh"]
    depends_on:
      - victim
    restart: "no"